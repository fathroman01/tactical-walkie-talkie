<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Comms</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Ionicons for modern icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    <!-- PeerJS for WebRTC -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Dashboard Header -->
        <header class="header">
            <div class="header-left">
                <div class="signal-bars">
                    <div class="bar active"></div>
                    <div class="bar active"></div>
                    <div class="bar active"></div>
                    <div class="bar inactive"></div>
                </div>
                <span class="status-text">ENCRYPTED</span>
            </div>
            <div class="header-right">
                <div class="battery">
                    <div class="battery-level"></div>
                </div>
                <span class="time" id="clock">00:00</span>
            </div>
        </header>

        <!-- Screens -->
        <main class="content">
            <!-- Screen 1: Radio / PTT -->
            <section id="screen-radio" class="screen active">
                <div class="top-left-status" id="top-left-status">
                    <span class="caller-label">INCOMING</span>
                    <div class="caller-id" id="caller-id-display"></div>
                </div>
                
                <div class="channel-display">
                    <h2 class="channel-label">CH</h2>
                    <h1 class="channel-number" id="current-ch-display">01</h1>
                    <p class="channel-name" id="current-ch-name">Bravo Six</p>
                </div>

                <div class="ptt-container">
                    <div class="ptt-ring ring-1"></div>
                    <div class="ptt-ring ring-2"></div>
                    <div class="ptt-ring ring-3"></div>
                    <button id="ptt-btn" class="ptt-button">
                        <ion-icon name="mic-outline"></ion-icon>
                        <span>PTT</span>
                    </button>
                </div>

                <div class="eq-visualizer">
                    <!-- Bars generated by JS when talking -->
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                </div>
                
                <div class="tx-status" id="tx-indicator">STANDBY</div>
            </section>

            <!-- Screen 2: Channels -->
            <section id="screen-channels" class="screen">
                <div class="pane-header">
                    <h2>SECURE CHANNELS</h2>
                    <button class="icon-btn" id="btn-add-channel">
                        <ion-icon name="add-outline"></ion-icon>
                    </button>
                </div>
                
                <div class="channel-list" id="channel-list">
                    <!-- Populated by JS -->
                </div>
            </section>

            <!-- Screen 3: Settings -->
            <section id="screen-settings" class="screen">
                <div class="pane-header">
                    <h2>COMM LINK SETUP</h2>
                </div>
                
                <div class="settings-card" style="background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 16px; padding: 20px;">
                    <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5;">Your device is configured to automatically link with any other device on the exact same Channel frequency (01-99).</p>
                    
                    <div class="input-group">
                        <label>YOUR CALLSIGN</label>
                        <input type="text" id="my-callsign-input" placeholder="e.g. Eagle One" value="Operator">
                    </div>
                    
                    <div class="input-group">
                        <label>NETWORK STATUS</label>
                        <input type="text" id="my-peer-id" readonly value="SCANNING...">
                    </div>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-target="screen-radio">
                <ion-icon name="radio-outline"></ion-icon>
                <span>RADIO</span>
            </button>
            <button class="nav-item" data-target="screen-channels">
                <ion-icon name="list-outline"></ion-icon>
                <span>CHANNELS</span>
            </button>
            <button class="nav-item" data-target="screen-settings">
                <ion-icon name="options-outline"></ion-icon>
                <span>SETTINGS</span>
            </button>
        </nav>

        <!-- Overlay / Modals -->
        <div id="modal-overlay" class="overlay">
            <div class="modal">
                <h3>CREATE CHANNEL</h3>
                <div class="input-group">
                    <label>CHANNEL NUMBER (01-99)</label>
                    <input type="number" id="new-ch-num" min="1" max="99" placeholder="02">
                </div>
                <div class="input-group">
                    <label>CALLSIGN</label>
                    <input type="text" id="new-ch-name" placeholder="Ghost Team" autocomplete="off">
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" id="btn-cancel-modal">CANCEL</button>
                    <button class="btn btn-primary" id="btn-save-channel">SAVE</button>
                </div>
            </div>
        </div>

        <!-- Hidden Audio for Incoming WebRTC Streams -->
        <audio id="remote-audio" autoplay></audio>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
